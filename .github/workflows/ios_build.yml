name: iOS Build

on:
  push:
    branches: ["master", "feature/*", "feature/purchases-salaries-expenses"]
  pull_request:
    branches: ["master", "feature/*", "feature/purchases-salaries-expenses"]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.0'
          channel: 'stable'
          cache: true

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Cache CocoaPods
        uses: actions/cache@v3
        with:
          path: |
            ios/Pods
            ~/.cocoapods
          key: ${{ runner.os }}-pods-${{ hashFiles('**/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod update ObjectBox --repo-update
          pod install --repo-update

      - name: Disable Code Signing in Xcode
        run: |
          cd ios/Runner.xcodeproj
          # Disable signing in project.pbxproj
          sed -i '' 's/CODE_SIGNING_ALLOWED = YES/CODE_SIGNING_ALLOWED = NO/g' project.pbxproj
          sed -i '' 's/CODE_SIGNING_REQUIRED = YES/CODE_SIGNING_REQUIRED = NO/g' project.pbxproj
          sed -i '' 's/CODE_SIGN_IDENTITY = "iPhone Developer"/CODE_SIGN_IDENTITY = ""/g' project.pbxproj
          sed -i '' 's/EXPANDED_CODE_SIGN_IDENTITY = .*/EXPANDED_CODE_SIGN_IDENTITY = "";/g' project.pbxproj
          sed -i '' 's/EXPANDED_CODE_SIGN_IDENTITY_NAME = .*/EXPANDED_CODE_SIGN_IDENTITY_NAME = "";/g' project.pbxproj

      - name: Build IPA (Unsigned)
        run: |
          # Clean build directories to avoid stale file issues
          rm -rf build/ios
          rm -rf ios/build
          rm -rf ~/Library/Developer/Xcode/DerivedData
          mkdir -p build/ios/iphoneos
          
          # Build iOS with explicit derived data path
          cd ios
          xcodebuild clean -workspace Runner.xcworkspace -scheme Runner
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath ../build/ios_derived_data \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            ONLY_ACTIVE_ARCH=NO \
            build
          
          # Move artifact
          cd ..
          
          # Find the built app in derived data
          BUILT_APP=$(find build/ios_derived_data -name "Runner.app" -type d | head -n 1)
          if [ -n "$BUILT_APP" ]; then
            echo "Found built app at: $BUILT_APP"
            cp -r "$BUILT_APP" build/ios/iphoneos/
          elif [ -d "build/Release-iphoneos/Runner.app" ]; then
            cp -r build/Release-iphoneos/Runner.app build/ios/iphoneos/
          elif [ -d "ios/build/Release-iphoneos/Runner.app" ]; then
            cp -r ios/build/Release-iphoneos/Runner.app build/ios/iphoneos/
          fi
          
          # Create IPA
          cd build/ios/iphoneos
          if [ -d "Runner.app" ]; then
            mkdir Payload
            cp -r Runner.app Payload/
            zip -r Runner.ipa Payload
            rm -rf Payload
            echo "IPA created successfully"
          else
            echo "Error: Runner.app not found"
            exit 1
          fi

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-unsigned
          path: build/ios/iphoneos/Runner.ipa
